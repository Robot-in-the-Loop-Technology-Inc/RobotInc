# Every push and PR runs the same gates a maintainer runs locally
# (node scripts/validate.mjs). main is what strangers install from —
# it must never hold a tree the validator rejects.
name: validate
on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/validate.mjs
